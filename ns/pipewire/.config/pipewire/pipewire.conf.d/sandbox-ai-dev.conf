# Restricted socket for sandbox-ai-dev.
#
# Adds a separate PipeWire socket that tags connecting clients with
# pipewire.sec.socket = "pipewire-sandbox-ai-dev".
# The access module marks these clients as "restricted";
# WirePlumber's sandbox-ai-dev Lua component then denies them access
# to Audio/Source and Audio/Sink/Monitor nodes (no capture).

module.protocol-native.args = {
    sockets = [
        { name = "pipewire-0" }
        { name = "pipewire-0-manager" }
        { name = "pipewire-sandbox-ai-dev"
          props = {
              pipewire.sec.socket = "pipewire-sandbox-ai-dev"
          }
        }
    ]
}

module.access.args = {
    access.socket = {
        pipewire-0 = "unrestricted"
        pipewire-0-manager = "unrestricted"
        pipewire-sandbox-ai-dev = "restricted"
    }
}
