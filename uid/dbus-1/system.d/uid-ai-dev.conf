<busconfig>
  <policy user="ai-dev">
    <deny send_destination="org.freedesktop.NetworkManager"/>
    <deny send_destination="org.freedesktop.login1" send_interface="org.freedesktop.login1.Manager" send_member="Reboot"/>
    <deny send_destination="org.freedesktop.login1" send_interface="org.freedesktop.login1.Manager" send_member="PowerOff"/>
    <deny send_destination="org.freedesktop.login1" send_interface="org.freedesktop.login1.Manager" send_member="Suspend"/>
    <deny send_destination="org.freedesktop.UPower" send_interface="org.freedesktop.UPower" send_member="Hibernate"/>
  </policy>
</busconfig>
