# WirePlumber component for ns-ai-dev audio restriction.
#
# This user-variant policy intentionally uses the same filenames as the bwrap
# variant so installing either variant replaces the other instead of mixing both.
#
# Registers the Lua script that denies Audio/Source and Audio/Sink/Monitor
# access to clients connecting through the restricted sandbox socket.

wireplumber.components = [
  {
    name = "client/sandbox-ai-dev.lua", type = script/lua
    provides = script.client.sandbox-ai-dev
  }
]

wireplumber.profiles = {
  main = {
    script.client.sandbox-ai-dev = required
  }
}
