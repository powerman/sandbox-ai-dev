# WirePlumber component for sandbox-ai-dev audio restriction.
#
# Registers the Lua script that denies Audio/Source and Audio/Sink/Monitor
# access to clients connecting through the restricted socket.

wireplumber.components = [
  {
    name = "client/sandbox-ai-dev.lua", type = script/lua
    provides = script.client.sandbox-ai-dev
  }
]

wireplumber.profiles = {
  main = {
    script.client.sandbox-ai-dev = required
  }
}
