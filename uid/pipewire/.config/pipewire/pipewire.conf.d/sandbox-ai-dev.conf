# Restricted socket for sandbox-ai-dev.
#
# This user-variant policy intentionally uses the same filenames as the bwrap
# variant so installing either variant replaces the other instead of mixing both.
#
# It exposes only the separate-user sandbox socket and tags connecting clients
# with pipewire.sec.socket = "pipewire-sandbox-ai-dev",
# so WirePlumber can deny capture while still allowing playback.

module.protocol-native.args = {
    sockets = [
        { name = "pipewire-0" }
        { name = "pipewire-0-manager" }
        { name = "/home/ai-dev/.run/pipewire-0"
          mode = "0660"
          props = {
              pipewire.sec.socket = "pipewire-sandbox-ai-dev"
          }
        }
    ]
}

module.access.args = {
    access.socket = {
        pipewire-0 = "unrestricted"
        pipewire-0-manager = "unrestricted"
        "/home/ai-dev/.run/pipewire-0" = "restricted"
    }
}
